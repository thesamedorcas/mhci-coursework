<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tilt to Pick</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div id="start-screen" class="screen active">
        <h1>Tilt to Pick</h1>
        <p>Tilt your phone to move between buttons.<br>Hold still on one button to select it.</p>
        <button onclick="onStartButton()">Start</button>
    </div>
    <div id="main-screen" class="screen">
        <div id="top-bar">
            <select id="speed-select" onchange="changeSpeed()">
                <option value="1">Very Slow</option>
                <option value="2">Slow</option>
                <option value="3" selected>Medium</option>
                <option value="4">Fast</option>
                <option value="5">Very Fast</option>
            </select>
            <button id="eval-btn" onclick="onEvalButton()">Start Evaluation</button>
        </div>
        <div class="button-row">
            <div class="button-cell" id="button-0">
                <div class="button-fill"></div><span class="button-label">1</span>
            </div>
            <div class="button-cell" id="button-1">
                <div class="button-fill"></div><span class="button-label">2</span>
            </div>
            <div class="button-cell" id="button-2">
                <div class="button-fill"></div><span class="button-label">3</span>
            </div>
        </div>
        <div id="status-bar">
            <span id="status-text">Tilt to a button, keep steady to select</span>
        </div>
        <div class="button-row">
            <div class="button-cell" id="button-3">
                <div class="button-fill"></div><span class="button-label">4</span>
            </div>
            <div class="button-cell" id="button-4">
                <div class="button-fill"></div><span class="button-label">5</span>
            </div>
            <div class="button-cell" id="button-5">
                <div class="button-fill"></div><span class="button-label">6</span>
            </div>
        </div>
        <div id="eval-stats">
            Correct: <strong id="stat-correct">0</strong> &nbsp;|&nbsp;
            Wrong: <strong id="stat-wrong">0</strong> &nbsp;|&nbsp;
            Avg time: <strong id="stat-time">-</strong>s
        </div>
        <div id="results-popup">
            <div id="results-card">
                <h2>Results</h2>
                <p id="results-text"></p>
                <button onclick="hideResults()">Close</button>
            </div>
        </div>
        <div id="centre-msg"></div>
    </div>
    <script src="main.js"></script>
</body>

</html>
